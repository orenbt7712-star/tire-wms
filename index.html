<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TireWMS</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0e14;--surface:#13161f;--card:#191d28;--card2:#1e2333;
  --border:#252b3b;--border2:#2e3549;
  --accent:#f5a623;--accent-dim:rgba(245,166,35,.13);
  --red:#e85d3f;--red-dim:rgba(232,93,63,.13);
  --green:#3ecf8e;--green-dim:rgba(62,207,142,.13);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,.13);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,.13);
  --text:#eef0f6;--muted:#7a8299;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* ══ LAYOUT ══ */
.app{display:flex;flex-direction:column;height:100dvh;}

/* ══ TOP BAR – רק שורה אחת קומפקטית ══ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  position:relative;
}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.app-title{font-size:14px;font-weight:900;flex-shrink:0;}
.sbox{
  flex:1;display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;
  min-width:0;
}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;width:100%;}
.sbox input::placeholder{color:var(--muted);}
.btn-add{
  background:var(--accent);color:#111;border:none;
  width:34px;height:34px;border-radius:8px;
  font-size:20px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 0 12px rgba(245,166,35,.3);
}
.btn-locate{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  width:34px;height:34px;border-radius:8px;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ══ FILTERS ROW ══ */
.filters-row{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:7px 10px;
  display:flex;gap:6px;align-items:center;
  flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
.filters-row::-webkit-scrollbar{display:none;}
.qsel{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;
  padding:5px 8px;outline:none;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.qsel:focus{border-color:var(--accent);}
.btn-clear{
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:7px;padding:5px 8px;font-size:11px;cursor:pointer;
  font-family:'Heebo',sans-serif;flex-shrink:0;white-space:nowrap;
}

/* ══ CONTENT ══ */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}
.view-fullscreen{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;}
.view-fullscreen .bottomnav-placeholder{display:none;}

/* ══ STATS BAR ══ */
.statsbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 12px;display:flex;gap:12px;align-items:center;flex-shrink:0;
}
.stat-item{font-size:12px;font-weight:600;}
.stat-item b{color:var(--accent);}
.stat-item .slow{color:var(--red);}

/* ══ TABLE ══ */
.twrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.twrap::-webkit-scrollbar{width:3px;height:3px;}
.twrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{
  background:var(--surface);color:var(--muted);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
  white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--text);}
thead th.sorted{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover,tbody tr:active{background:var(--card2);}
tbody tr.erow{background:#1a2038!important;outline:2px solid var(--accent);outline-offset:-1px;}
td{padding:8px 10px;vertical-align:middle;}
.sz{font-family:monospace;font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:2px 5px;display:inline-block;}
.ttype{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.ts{background:rgba(245,166,35,.15);color:var(--accent);}
.tw{background:var(--blue-dim);color:var(--blue);}
.ta{background:var(--green-dim);color:var(--green);}
.to{background:var(--purple-dim);color:var(--purple);}
.tt{background:var(--red-dim);color:var(--red);}
.locbadge{display:inline-flex;align-items:center;gap:3px;background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:11px;font-weight:600;}
.lp{color:var(--muted);font-size:9px;}
.qty-ok{color:var(--green);font-weight:700;}
.qty-low{color:var(--red);font-weight:700;}
.acts{display:flex;gap:4px;}
.ib{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.ib:hover{border-color:var(--accent);background:var(--accent-dim);}
.ib.del:hover{border-color:var(--red);background:var(--red-dim);}
.ib.sv{border-color:rgba(62,207,142,.4);background:var(--green-dim);color:var(--green);}
.ib.cx:hover{border-color:var(--red);background:var(--red-dim);}

/* inline edit */
.ie{background:var(--card2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:'Heebo',sans-serif;font-size:11px;padding:4px 5px;outline:none;min-width:0;}
.ie-xs{width:48px;}.ie-sm{width:60px;}.ie-lg{width:110px;}
.ie-sel{background:var(--card2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:'Heebo',sans-serif;font-size:11px;padding:4px 4px;outline:none;}

/* empty */
.empty-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:20px;}
.empty-wrap .ei{font-size:48px;opacity:.3;}
.empty-wrap p{font-size:14px;font-weight:700;}
.empty-wrap span{font-size:12px;text-align:center;}

/* ══ WAREHOUSE ══ */
#viewWarehouse{padding:12px;overflow:auto;}
.wh-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wh-head h2{font-size:14px;font-weight:800;}
.ftabs{display:flex;gap:6px;}
.ftab{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Heebo',sans-serif;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#111;}
.legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ldot{width:10px;height:10px;border-radius:2px;}
.gwrap{overflow:auto;-webkit-overflow-scrolling:touch;}
.sgrid{display:grid;gap:5px;width:max-content;}
.scell{width:62px;height:62px;border-radius:7px;border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;transition:all .15s;}
.scell:active{transform:scale(.95);}
.scell.empty{opacity:.25;}
.scell .cl{font-size:8px;color:var(--muted);font-weight:700;}
.scell .cn{font-size:15px;font-weight:900;line-height:1;}
.scell .cb{font-size:7px;color:var(--muted);max-width:56px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sh{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);width:62px;height:20px;}
.rl{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);height:62px;width:24px;}

/* ══ BOTTOM NAV ══ */
.bottomnav{
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;flex-shrink:0;
}
.bnav-btn{
  flex:1;padding:10px 0 8px;background:none;border:none;cursor:pointer;
  font-family:'Heebo',sans-serif;display:flex;flex-direction:column;
  align-items:center;gap:2px;
  color:var(--muted);border-top:2px solid transparent;transition:all .15s;
}
.bnav-btn.active{color:var(--accent);border-top-color:var(--accent);}
.bnav-btn .bi{font-size:20px;line-height:1;}
.bnav-btn .bl{font-size:10px;font-weight:700;}

/* ══ ADD MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px 16px 0 0;width:100%;max-width:540px;
  max-height:90dvh;overflow-y:auto;padding:20px 16px 30px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.1,.64,1);
}
.overlay.open .modal{transform:none;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mhead h3{font-size:16px;font-weight:900;}
.xbtn{background:var(--card);border:1px solid var(--border);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fi{display:flex;flex-direction:column;gap:5px;}
.fi.full{grid-column:1/-1;}
.fi label{font-size:11px;font-weight:700;color:var(--muted);}
.fi input,.fi select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;padding:10px 11px;outline:none;width:100%;}
.fi input:focus,.fi select:focus{border-color:var(--accent);}
.fi input::placeholder{color:#3e4560;}
.locbox{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.factions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.btn{padding:10px 16px;border-radius:9px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-acc{background:var(--accent);color:#111;}
.btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,93,63,.3);}

/* type buttons */
.type-btns{display:flex;gap:6px;flex-wrap:wrap;grid-column:1/-1;}
.type-btn{padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.type-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}

/* confirm */
.conf-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .18s;}
.conf-ov.open{opacity:1;pointer-events:all;}
.conf-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:320px;text-align:center;}
.conf-box h4{font-size:16px;font-weight:800;margin-bottom:8px;}
.conf-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.conf-acts{display:flex;gap:10px;justify-content:center;}

/* toast */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>

<script>
// Service Worker — עדכון אוטומטי
// פולבק אם Firebase לא נטען
window.addEventListener('load', function(){
  setTimeout(function(){
    const app = document.querySelector('.app');
    const ls = document.getElementById('loginScreen');
    if(app && app.style.display==='none' && !ls){
      app.style.display='';
    }
  }, 5000);
});
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // בדוק עדכון כל פתיחה
    reg.update();
    reg.addEventListener('updatefound',()=>{
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed' && navigator.serviceWorker.controller){
          // יש גרסה חדשה — עדכן אוטומטית
          newWorker.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  });
  // כשה-SW החדש ממתין — רענן
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    window.location.reload();
  });
}
</script>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo-icon">🛞</div>
  <div class="app-title">TireWMS</div>
  <span id="syncStatus" style="font-size:11px;color:var(--muted);flex-shrink:0;">🔄</span>
  <button id="langBtn" onclick="toggleLang()" title="שפה / لغة" style="background:var(--card);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;">🌐</button>
  <button class="btn-locate" onclick="showBackupMenu()" title="גיבוי / ייבוא">💾</button>
  <button class="btn-locate" onclick="locateNearest()" title="מצא פריט קריטי">📍</button>
  <button class="btn-add" onclick="openAddModal()" title="הוסף צמיג">＋</button>
</div>

<!-- BACKUP MENU -->
<div class="conf-ov" id="backupMenu">
  <div class="conf-box" style="max-width:340px;text-align:right;">
    <h4 style="margin-bottom:14px;">💾 גיבוי ונתונים</h4>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-ghost" style="justify-content:flex-start;" onclick="exportJSON()">📤 ייצוא לקובץ JSON</button>
      <button class="btn btn-ghost" style="justify-content:flex-start;" onclick="document.getElementById('importFile').click()">📥 ייבוא מקובץ JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)"/>
      <div style="border-top:1px solid var(--border);padding-top:10px;font-size:11px;color:var(--muted);">
        ✅ הנתונים נשמרים אוטומטית בדפדפן זה
      </div>
      <button class="btn btn-red" style="justify-content:flex-start;" onclick="clearAllData()">🗑️ מחק את כל הנתונים</button>
    </div>
    <div style="margin-top:14px;display:flex;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeBackupMenu()">סגור</button>
    </div>
  </div>
</div>

<!-- FILTERS ROW -->
<div class="filters-row">
  <select class="qsel" id="fBrand" onchange="applyFilters()">
    <option value="">🏷️ מותג</option>
  </select>
  <select class="qsel" id="fSize" onchange="applyFilters()">
    <option value="">📐 מידה</option>
  </select>
  <button class="btn-clear" onclick="clearFilters()">✕ נקה</button>
</div>

<!-- SEARCH BAR -->
<div style="padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);">
  <div style="display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:0 14px;height:46px;gap:10px;">
    <span style="color:var(--muted);font-size:18px;">🔍</span>
    <input id="mainSearch" type="text" placeholder="חיפוש לפי מידה, מותג, מיקום..."
      inputmode="numeric" maxlength="10"
      oninput="formatSize(this);document.getElementById('clearSearchBtn').style.display=this.value?'flex':'none';currentPage=0;renderTable();"
      style="flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;font-family:inherit;direction:rtl;"/>
    <button onclick="clearSearch()" id="clearSearchBtn"
      style="display:none;background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:14px;cursor:pointer;padding:3px 9px;line-height:1.4;">✕</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- INVENTORY VIEW -->
  <div class="view active" id="viewInventory">
    <div class="statsbar">
      <div class="stat-item"><b id="statCount">0</b> פריטים</div>
    </div>
    <div id="tableArea" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
  </div>

  <!-- WAREHOUSE VIEW -->
  <div class="view" id="viewWarehouse">
    <!-- Header -->
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div>
        <div style="font-size:13px;font-weight:800;">🗂️ מפת מחסן</div>
        <div style="font-size:10px;color:var(--muted);">7,000 מ"ר · צורת ר</div>
      </div>
      <div style="display:flex;gap:6px;" id="floorTabs"></div>
    </div>
    <!-- Legend -->
    <div style="padding:7px 14px;display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><div style="width:11px;height:11px;border-radius:3px;background:var(--green-dim);border:1px solid var(--green);"></div>תפוס</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><div style="width:11px;height:11px;border-radius:3px;background:var(--card);border:1px solid var(--border);"></div>ריק</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><div style="width:11px;height:11px;border-radius:3px;background:var(--accent-dim);border:1px solid var(--accent);"></div>נבחר</div>
      <div style="margin-right:auto;font-size:11px;color:var(--muted);" id="whStats"></div>
    </div>
    <!-- SVG Map -->
    <div style="flex:1;overflow:auto;padding:12px;" id="warehouseContent"></div>
    <!-- Detail Panel -->
    <div id="cellDetail" style="display:none;position:fixed;bottom:54px;right:0;left:0;background:var(--surface);border-top:2px solid var(--accent);padding:14px;z-index:200;max-height:50vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:800;" id="cellDetailTitle"></div>
        <button onclick="closeCellDetail()" style="background:var(--card);border:1px solid var(--border);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--muted);font-size:16px;">✕</button>
      </div>
      <div id="cellDetailBody"></div>
    </div>
  </div>

</div>

  <!-- MAP EDITOR VIEW -->
  <div class="view" id="viewMapEditor">
    <!-- Toolbar -->
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto;">
      <div style="font-size:12px;font-weight:800;flex-shrink:0;">✏️ מפת מחסן</div>
      <div style="display:flex;gap:5px;flex-shrink:0;" id="mapTools">
        <button id="tool-wall" onclick="setMapTool('wall')" title="ציור קיר" style="background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">🖊️ קיר</button>

<div id="toast"></div>

<script>
let items=[],nextId=1,editingId=null,pendingDel=null,currentFloor='1';
let sortCol='id',sortDir=1;
const ROWS=['A','B','C','D','E','F'],COLS=['1','2','3','4','5','6','7','8'];
const TC={קיץ:'ts',חורף:'tw','ארבע עונות':'ta',שטח:'to',משאית:'tt'};
const TE={קיץ:'☀️',חורף:'❄️','ארבע עונות':'🍂',שטח:'🏔️',משאית:'🚛'};
const TYPES=['קיץ','חורף','ארבע עונות','שטח','משאית'];
const sz=it=>`${it.w}/${it.p}R${it.d}`;

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
window._toast = toast;

/* VIEWS */
function switchView(n,el){
  // הסר fullscreen מהכל
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('active');
    v.classList.remove('view-fullscreen');
  });
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));

  const view = document.getElementById('view'+n[0].toUpperCase()+n.slice(1));
  view.classList.add('active');
  el.classList.add('active');

  // מחסן ועורך — מסך מלא
  if(n==='warehouse'||n==='mapEditor'){
    view.classList.add('view-fullscreen');
    // הסתר topbar וסרגל פילטרים
    document.querySelector('.topbar').style.display='none';
    document.querySelector('.filters-row').style.display='none';
    document.querySelector('.bottomnav').style.display='none';
    // כפתור חזרה
    showBackBtn(n);
    if(n==='warehouse') renderWarehouse();
    if(n==='mapEditor') setTimeout(initMapEditor, 50);
  } else {
    // מלאי — הצג הכל
    document.querySelector('.topbar').style.display='';
    document.querySelector('.filters-row').style.display='';
    document.querySelector('.bottomnav').style.display='';
    hideBackBtn();
  }
}

function showBackBtn(viewName){
  let btn=document.getElementById('backToInventory');
  if(!btn){
    btn=document.createElement('button');
    btn.id='backToInventory';
    btn.style.cssText='position:fixed;top:10px;right:10px;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Heebo,sans-serif;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 12px rgba(0,0,0,.4);';
    btn.innerHTML='📋 מלאי';
    btn.addEventListener('click',()=>{
      const navBtn=document.getElementById('nav-inventory');
      if(navBtn) switchView('inventory',navBtn);
    });
    document.body.appendChild(btn);
  }
  btn.style.display='flex';
}

function hideBackBtn(){
  const btn=document.getElementById('backToInventory');
  if(btn) btn.style.display='none';
}

/* RENDER */
function getFiltered(){
  const fb=document.getElementById('fBrand').value;
  const fs=document.getElementById('fSize').value;
  const raw=document.getElementById('mainSearch').value.trim();
  const q=raw.toLowerCase();
  const qUp=raw.toUpperCase();
  return items.filter(it=>{
    if(fb&&it.brand!==fb)return false;
    if(fs&&sz(it)!==fs)return false;
    if(q&&!(
      it.brand.toLowerCase().includes(q)||
      (it.model||'').toLowerCase().includes(q)||
      sz(it).toUpperCase().includes(qUp)||
      (it.type||'').toLowerCase().includes(q)||
      (it.notes||'').toLowerCase().includes(q)
    ))return false;
    return true;
  }).sort((a,b)=>{
    const k=sortCol,av=a[k]??0,bv=b[k]??0;
    return typeof av==='string'?av.localeCompare(bv,'he')*sortDir:(av-bv)*sortDir;
  });
}

function renderTable(){
  const area=document.getElementById('tableArea');
  const data=getFiltered();
  const sc=document.getElementById('statCount'); if(sc) sc.textContent=data.length;
  if(items.length===0){
    area.innerHTML=`<div class="empty-wrap"><div class="ei">🛞</div><p>${t('emptyTitle')}</p><span>${t('emptyHint')}</span></div>`;
    return;
  }
  const sa=c=>sortCol===c?(sortDir===1?'↑':'↓'):'';
  let html=`<div class="twrap"><table>
    <thead><tr>
      <th onclick="sortBy('id')" class="${sortCol==='id'?'sorted':''}"># ${sa('id')}</th>
      <th onclick="sortBy('w')" class="${sortCol==='w'?'sorted':''}">מידה ${sa('w')}</th>
      <th onclick="sortBy('brand')" class="${sortCol==='brand'?'sorted':''}">מותג ${sa('brand')}</th>
      <th onclick="sortBy('row')" class="${sortCol==='row'?'sorted':''}">מיקום ${sa('row')}</th>
      <th>${editingId?'↵·Esc':'פעולות'}</th>
    </tr></thead><tbody>`;
  data.forEach(it=>{html+=it.id===editingId?editRow(it):viewRow(it);});
  // Pagination
  const totalPages = Math.ceil(data.length / PAGE_SIZE);
  if(currentPage >= totalPages) currentPage = Math.max(0, totalPages-1);
  const start = currentPage * PAGE_SIZE;
  const pageData = data.slice(start, start + PAGE_SIZE);

  pageData.forEach(it=>{ html += editingId===it.id ? editRow(it) : viewRow(it); });
  html+=`</tbody></table></div>`;

  // Pagination controls
  if(totalPages > 1){
    html = html.replace('</div>', '') // remove last </div> temp
    let pgHtml = `<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;">`;
    pgHtml += `<button onclick="prevPage()" ${currentPage===0?'disabled':''} style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:${currentPage===0?'var(--muted)':'var(--text)'};cursor:pointer;font-family:inherit;font-size:13px;">→ הקודם</button>`;
    pgHtml += `<span style="font-size:12px;color:var(--muted);">${currentPage+1} / ${totalPages} (${data.length} פריטים)</span>`;
    pgHtml += `<button onclick="nextPage(${totalPages})" ${currentPage>=totalPages-1?'disabled':''} style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:${currentPage>=totalPages-1?'var(--muted)':'var(--text)'};cursor:pointer;font-family:inherit;font-size:13px;">הבא ←</button>`;
    pgHtml += `</div>`;
    area.innerHTML = html;
    area.insertAdjacentHTML('beforeend', pgHtml);
    return;
  }

  area.innerHTML=html;
}

function viewRow(it){
  return `<tr id="tr-${it.id}" onclick="showItemLocation(${it.id})" style="cursor:pointer;">
    <td style="color:var(--muted);font-size:10px;">#${it.id}</td>
    <td><span class="sz">${sz(it)}</span></td>
    <td><span style="font-weight:700;">${it.brand}</span>${it.model?`<br><span style="font-size:10px;color:var(--muted)">${it.model}</span>`:''}</td>
    <td><div class="locbadge">
      ${it.pn1?`<span><span class="lp" style="color:var(--accent);">פ1</span> ${it.pn1}</span><span style="color:var(--border2)">·</span>`:''}
      ${it.p1?`<span><span class="lp">שו׳ ימין</span> ${it.p1}</span><span style="color:var(--border2)">·</span>`:''}
      <span><span class="lp">עמ׳</span> ${it.col}</span>
      <span style="color:var(--border2)">·</span>
      <span><span class="lp">קו׳</span> ${it.floor}</span>
      ${it.pn2?`<span style="color:var(--border2)">·</span><span><span class="lp" style="color:var(--accent);">פ2</span> ${it.pn2}</span>`:''}
      ${it.p2?`<span style="color:var(--border2)">·</span><span><span class="lp">שו׳ שמאל</span> ${it.p2}</span>`:''}
      ${it.agr?`<span style="color:var(--border2)">·</span><span><span class="lp" style="color:var(--green);">🌾</span> ${it.agr}</span>`:''}
    </div></td>
    <td><div class="acts">
      <button class="ib" onclick="event.stopPropagation();startEdit(${it.id})">✏️</button>
      <button class="ib del" onclick="event.stopPropagation();askDelete(${it.id})">🗑️</button>
    </div></td>
  </tr>`;
}

function editRow(it){
  return `<tr id="tr-${it.id}" class="erow">
    <td style="color:var(--accent);font-size:10px;">#${it.id}</td>
    <td><input class="ie" id="esz" type="text" value="${sz(it)}" oninput="formatSize(this)" style="width:90px;font-family:monospace;font-weight:800;text-align:center;letter-spacing:.5px;"/></td>
    <td><div style="display:flex;flex-direction:column;gap:3px;">
      <input class="ie ie-lg" id="eb" type="text" value="${it.brand}" placeholder="מותג"/>

function startEdit(id){editingId=id;renderTable();setTimeout(()=>{const f=document.getElementById('esz');if(f){f.focus();f.select();}},40);}
function cancelEdit(){editingId=null;renderTable();}
function saveEdit(id){
  const szv=document.getElementById('esz').value.trim();
  const parsed=parseSize(szv);
  if(!parsed){toast('❌ מידה לא תקינה — לדוגמה: 205/55R16');return;}
  const {w,p,d}=parsed;
  const b=document.getElementById('eb').value.trim(),m=document.getElementById('em').value.trim();
  const co=document.getElementById('ec').value,fl=document.getElementById('ef').value;
  const p1=document.getElementById('ep1').value.trim(),p2=document.getElementById('ep2').value.trim();
  const pn1=document.getElementById('epn1').value.trim(),pn2=document.getElementById('epn2').value.trim();
  const agr=document.getElementById('eagr') ? document.getElementById('eagr').value.trim() : (items.find(x=>x.id===id)||{}).agr||'';
  if(!b){toast('❌ מלא שדות חובה');return;}
  const it=items.find(x=>x.id===id);
  Object.assign(it,{w,p,d,brand:b,model:m,col:co,floor:fl,p1,p2,pn1,pn2,agr});
  if(window._saveItem){
    window._saveItem(it);
  } else {
    refreshDropdowns();renderTable();
  }
  editingId=null;toast('✅ עודכן');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&editingId!==null){e.preventDefault();saveEdit(editingId);}
  if(e.key==='Escape'&&editingId!==null){cancelEdit();}
});

/* WAREHOUSE — מפת ר */
// צורת ר עברית מדויקת (תוכנית קומה):
//
//  ┌─────────────────────┐
//  │  צלע קצרה (8 עמ׳)  │
//  ├───────┬─────────────┴────────────────────────────┐
//  │       │       צלע ארוכה (20 עמ׳)                │
//  └───────┴──────────────────────────────────────────┘
//
// הצלע הקצרה מחוברת לצד ימין-עליון של הצלע הארוכה

const WH_LONG  = 20;
const WH_SHORT = 8;
const WH_FLOORS = ['1','2','3'];
const CW=52, CH=48, GAP=4, LBL=40, PAD=14;
let selectedCell = null;

function renderWarehouse(){
  const floors=[...new Set(items.map(i=>i.floor).filter(Boolean))].sort();
  const allF=floors.length>0?floors:WH_FLOORS;
  if(!allF.includes(currentFloor)) currentFloor=allF[0];
  document.getElementById('floorTabs').innerHTML=allF.map(f=>
    `<button class="ftab ${f===currentFloor?'active':''}" onclick="setFloor('${f}',this)">קו׳ ${f}</button>`
  ).join('');
  const st=document.getElementById('whStats');
  if(st) st.textContent=items.filter(i=>i.floor===currentFloor).length+' פריטים';
  renderGrid();
}

function setFloor(f,el){
  currentFloor=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  selectedCell=null;
  closeCellDetail();
  renderGrid();
}

function cellItems(col,row){
  return items.filter(it=>
    it.floor===currentFloor &&
    String(it.col)===String(col) &&
    (row==='ימין'?it.p1==='ימין':it.p2==='שמאל')
  );
}

function svgCell(col,row,x,y){
  const its=cellItems(col,row);
  const has=its.length>0;
  const isSel=selectedCell&&selectedCell.col===String(col)&&selectedCell.row===row;
  const bg=isSel?'#1e3020':has?'#0d1f0d':'#191d28';
  const strk=isSel?'#f5a623':has?'#3ecf8e':'#2a3045';
  const sw=isSel?2:1;
  let inner='';
  if(has){
    const b=(its[0].brand||'').substring(0,6);
    const s=sz(its[0]).substring(0,9);
    inner+=`<circle cx="${x+CW-6}" cy="${y+7}" r="4" fill="#3ecf8e"/>`;
    inner+=`<text x="${x+CW/2}" y="${y+18}" text-anchor="middle" fill="#eef0f6" font-size="9" font-weight="700">${b}</text>`;
    inner+=`<text x="${x+CW/2}" y="${y+29}" text-anchor="middle" fill="#f5a623" font-size="8" font-family="monospace">${s}</text>`;
    if(its.length>1)
      inner+=`<text x="${x+CW/2}" y="${y+40}" text-anchor="middle" fill="#7a8299" font-size="8">+${its.length-1}</text>`;
  } else {
    inner+=`<text x="${x+CW/2}" y="${y+CH/2+5}" text-anchor="middle" fill="#252b3b" font-size="20">·</text>`;
  }
  inner+=`<text x="${x+3}" y="${y+9}" fill="#3e4560" font-size="7" font-weight="600">${col}</text>`;
  return `<g onclick="onCellClick('${col}','${row}')" style="cursor:${has?'pointer':'default'}">
    <rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="5" fill="${bg}" stroke="${strk}" stroke-width="${sw}"/>
    ${inner}
  </g>`;
}

function renderGrid(){
  const wrap=document.getElementById('warehouseContent');
  if(!wrap) return;

  // ─── מידות ───
  const ROW_H    = CH + GAP;          // גובה שורה אחת
  const SEC_H    = 20 + 2*ROW_H + 8; // כותרת + 2 שורות + padding
  const LONG_W   = LBL + WH_LONG*(CW+GAP);
  const SHORT_W  = LBL + WH_SHORT*(CW+GAP);
  const SVG_W    = LONG_W + PAD*2;
  const SHORT_Y  = PAD;
  const JOIN_H   = 14;  // גובה חיבור בין הצלעות
  const LONG_Y   = SHORT_Y + SEC_H + JOIN_H;
  const SVG_H    = LONG_Y + SEC_H + PAD;

  let svg=`<svg xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 ${SVG_W} ${SVG_H}"
    width="${SVG_W}" height="${SVG_H}"
    style="display:block;min-width:${SVG_W}px;font-family:Heebo,sans-serif;">`;

  // רקע
  svg+=`<rect width="${SVG_W}" height="${SVG_H}" fill="#0c0e14"/>`;

  // ══════════ ר עברית — מסגרת חיצונית ══════════
  // הצלע הקצרה חוברת לפינה ימין-עליון של הצלע הארוכה
  const ox = PAD-2;
  const longTop  = LONG_Y - 2;
  const longBot  = LONG_Y + SEC_H + 2;
  const longRight= PAD + LONG_W + 2;
  const shortRight= PAD + SHORT_W + 2;
  const shortTop  = SHORT_Y - 2;
  const shortBot  = SHORT_Y + SEC_H + 2;

  // מסגרת ר: מימין-למעלה, עוקב בכיוון שעון
  const rPath = [
    `M ${ox} ${shortTop}`,           // פינה שמאל-עליון של ראש
    `L ${shortRight} ${shortTop}`,    // חלק עליון של ראש
    `L ${shortRight} ${shortBot}`,    // צד ימין של ראש
    `L ${shortRight} ${longTop}`,     // ירידה לצלע הארוכה
    `L ${longRight} ${longTop}`,      // חלק עליון של גוף
    `L ${longRight} ${longBot}`,      // צד ימין של גוף
    `L ${ox} ${longBot}`,            // תחתית
    `L ${ox} ${shortTop}`,           // חזרה למעלה
    `Z`
  ].join(' ');

  svg+=`<path d="${rPath}" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>`;

  // כותרת מרכזית
  svg+=`<text x="${SVG_W/2}" y="${SHORT_Y-8}" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="900">🏭 מחסן צמיגים — קומה ${currentFloor}</text>`;

  // ══════════ צלע קצרה (ימין-עליון) ══════════
  svg+=`<rect x="${PAD-2}" y="${SHORT_Y-2}" width="${SHORT_W+4}" height="${SEC_H+4}" rx="8" fill="#13161f" stroke="#252b3b"/>`;
  svg+=`<text x="${PAD+SHORT_W/2}" y="${SHORT_Y+13}" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="800">צלע קצרה — ${WH_SHORT} עמודות</text>`;

  // שורה ימין — צלע קצרה
  svg+=`<text x="${PAD+LBL-3}" y="${SHORT_Y+20+ROW_H/2+5}" text-anchor="end" fill="#7a8299" font-size="9" font-weight="700">ימין</text>`;
  for(let col=1;col<=WH_SHORT;col++){
    svg+=svgCell(col,'ימין', PAD+LBL+(col-1)*(CW+GAP), SHORT_Y+20);
  }
  // שורה שמאל — צלע קצרה
  svg+=`<text x="${PAD+LBL-3}" y="${SHORT_Y+20+ROW_H+ROW_H/2+5}" text-anchor="end" fill="#7a8299" font-size="9" font-weight="700">שמאל</text>`;
  for(let col=1;col<=WH_SHORT;col++){
    svg+=svgCell(col,'שמאל', PAD+LBL+(col-1)*(CW+GAP), SHORT_Y+20+ROW_H);
  }

  // ══════════ חיבור בין צלעות ══════════
  const connX = PAD + SHORT_W/2;
  svg+=`<line x1="${connX}" y1="${SHORT_Y+SEC_H+2}" x2="${connX}" y2="${LONG_Y-2}" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>`;

  // ══════════ צלע ארוכה (תחתית) ══════════
  svg+=`<rect x="${PAD-2}" y="${LONG_Y-2}" width="${LONG_W+4}" height="${SEC_H+4}" rx="8" fill="#13161f" stroke="#252b3b"/>`;
  svg+=`<text x="${PAD+LONG_W/2}" y="${LONG_Y+13}" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="800">צלע ארוכה — ${WH_LONG} עמודות</text>`;

  // שורה ימין — צלע ארוכה
  svg+=`<text x="${PAD+LBL-3}" y="${LONG_Y+20+ROW_H/2+5}" text-anchor="end" fill="#7a8299" font-size="9" font-weight="700">ימין</text>`;
  for(let col=1;col<=WH_LONG;col++){
    svg+=svgCell(col,'ימין', PAD+LBL+(col-1)*(CW+GAP), LONG_Y+20);
  }
  // שורה שמאל — צלע ארוכה
  svg+=`<text x="${PAD+LBL-3}" y="${LONG_Y+20+ROW_H+ROW_H/2+5}" text-anchor="end" fill="#7a8299" font-size="9" font-weight="700">שמאל</text>`;
  for(let col=1;col<=WH_LONG;col++){
    svg+=svgCell(col,'שמאל', PAD+LBL+(col-1)*(CW+GAP), LONG_Y+20+ROW_H);
  }

  svg+='</svg>';
  wrap.innerHTML=svg;
}

function onCellClick(col,row){
  const its=cellItems(col,row);
  if(!its.length){toast('📦 תא ריק');return;}
  selectedCell={col,row};
  renderGrid();
  showCellDetail2(col,row,its);
}

function showCellDetail2(col,row,its){
  document.getElementById('cellDetailTitle').textContent=`📍 עמ׳ ${col} · שו׳ ${row} · קו׳ ${currentFloor}`;
  document.getElementById('cellDetailBody').innerHTML=its.map(it=>`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
        <span style="font-family:monospace;font-size:14px;font-weight:900;color:var(--accent);">${sz(it)}</span>
        <span style="font-size:14px;font-weight:700;">${it.brand}</span>
        ${it.model?`<span style="font-size:11px;color:var(--muted);">${it.model}</span>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${it.pn1?`<span style="font-size:11px;background:var(--accent-dim);color:var(--accent);border-radius:5px;padding:2px 7px;">פ1 ${it.pn1}</span>`:''}
        ${it.p1?`<span style="font-size:11px;background:var(--green-dim);color:var(--green);border-radius:5px;padding:2px 7px;">↗ שו׳ ימין ${it.p1}</span>`:''}
        <span style="font-size:11px;background:var(--card2);color:var(--muted);border-radius:5px;padding:2px 7px;">עמ׳ ${it.col}</span>
        <span style="font-size:11px;background:var(--card2);color:var(--muted);border-radius:5px;padding:2px 7px;">קו׳ ${it.floor}</span>
        ${it.pn2?`<span style="font-size:11px;background:var(--accent-dim);color:var(--accent);border-radius:5px;padding:2px 7px;">פ2 ${it.pn2}</span>`:''}
        ${it.p2?`<span style="font-size:11px;background:var(--blue-dim);color:var(--blue);border-radius:5px;padding:2px 7px;">↙ שו׳ שמאל ${it.p2}</span>`:''}

  `).join('');

/* BARCODE SCANNER */
let barcodeStream = null;
let barcodeInterval = null;
let barcodeDetector = null;

async function startBarcode(){
  const wrap = document.getElementById('barcodeWrap');
  const video = document.getElementById('barcodeVideo');
  const result = document.getElementById('barcodeResult');
  result.style.display = 'none';

  // בדוק תמיכה ב-BarcodeDetector
  if(!('BarcodeDetector' in window)){
    // fallback — פתח מצלמה ובקש קוד ידני
    toast('📷 סריקת ברקוד לא נתמכת — נסה כרום אנדרואיד');
    return;
  }

  try {
    barcodeStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    video.srcObject = barcodeStream;
    wrap.style.display = 'block';

    barcodeDetector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e'] });

    barcodeInterval = setInterval(async () => {
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        try {
          const barcodes = await barcodeDetector.detect(video);
          if(barcodes.length > 0){
            const code = barcodes[0].rawValue;
            stopBarcode();
            parseBarcodeData(code);
          }
        } catch(e){}
      }
    }, 300);

  } catch(e){
    toast('❌ לא ניתן לגשת למצלמה');
  }
}

function stopBarcode(){
  clearInterval(barcodeInterval);
  barcodeInterval = null;
  if(barcodeStream){
    barcodeStream.getTracks().forEach(t => t.stop());
    barcodeStream = null;
  }
  const wrap = document.getElementById('barcodeWrap');
  const video = document.getElementById('barcodeVideo');
  if(wrap) wrap.style.display = 'none';
  if(video) video.srcObject = null;
}

function parseBarcodeData(code){
  const result = document.getElementById('barcodeResult');
  result.style.display = 'block';

  // EAN-13 של צמיג לרוב מכיל מידה בפורמט מוכר
  // ניסיון לחלץ מידה מהקוד
  let sizeFound = false;

  // חפש תבנית 3 ספרות + 2 ספרות + 2 ספרות בתוך הברקוד
  const sizeMatch = code.match(/(\d{3})(\d{2})(\d{2})/);
  if(sizeMatch){
    const w = +sizeMatch[1], p = +sizeMatch[2], d = +sizeMatch[3];
    // בדוק שהמידות הגיוניות
    if(w >= 145 && w <= 365 && p >= 25 && p <= 85 && d >= 12 && d <= 24){
      const sz = `${w}/${p}R${d}`;
      document.getElementById('aSz').value = sz;
      result.textContent = `✅ ברקוד: ${code} → מידה: ${sz}`;
      result.style.color = 'var(--green)';
      result.style.borderColor = 'var(--green)';
      result.style.background = 'var(--green-dim)';
      sizeFound = true;
      toast('✅ מידה זוהתה מהברקוד!');
    }
  }

  if(!sizeFound){
    // הצג את הקוד ואפשר הזנה ידנית
    result.textContent = `📷 ברקוד: ${code} — לא זוהתה מידה אוטומטית`;
    result.style.color = 'var(--blue)';
    result.style.borderColor = 'var(--blue)';
    result.style.background = 'var(--blue-dim)';
    // העתק לשדה הערות
    const notes = document.getElementById('aNo');
    if(notes && !notes.value) notes.value = 'ברקוד: ' + code;
    toast('📷 ברקוד נסרק — הזן מידה ידנית');
  }
}

let voiceRecog = null;

function startVoice(){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){ toast('❌ דיבור לא נתמך בדפדפן זה — נסה כרום'); return; }

  const btn = document.getElementById('voiceBtn');
  const status = document.getElementById('voiceStatus');
  const resultBox = document.getElementById('voiceResult');

  if(voiceRecog){
    voiceRecog.stop();
    voiceRecog = null;
    btn.style.background = 'var(--green-dim)';
    btn.style.borderColor = 'var(--green)';
    btn.textContent = '🎤';
    status.style.display = 'none';
    return;
  }

  voiceRecog = new SpeechRec();
  voiceRecog.lang = 'he-IL';
  voiceRecog.continuous = false;
  voiceRecog.interimResults = false;

  // אנימציה
  btn.style.background = 'var(--red-dim)';
  btn.style.borderColor = 'var(--red)';
  btn.textContent = '⏹️';
  status.style.display = 'block';
  resultBox.style.display = 'none';

  voiceRecog.onresult = e => {
    const text = e.results[0][0].transcript;
    document.getElementById('voiceText').textContent = '"' + text + '"';
    resultBox.style.display = 'block';
    parseVoiceInput(text);
  };

  voiceRecog.onerror = e => {
    toast('❌ שגיאת זיהוי: ' + e.error);
    resetVoiceBtn();
  };

  voiceRecog.onend = () => {
    resetVoiceBtn();
  };

  voiceRecog.start();
}

function resetVoiceBtn(){
  const btn = document.getElementById('voiceBtn');
  if(btn){ btn.style.background='var(--green-dim)'; btn.style.borderColor='var(--green)'; btn.textContent='🎤'; }
  const status = document.getElementById('voiceStatus');
  if(status) status.style.display='none';
  voiceRecog = null;
}

function parseVoiceInput(text){
  const t = text.toLowerCase().trim();

  // ─── מידה ───
  // "מאתיים וחמש חמישים וחמש ר שש עשרה" או "205 55 16" או "205/55R16"
  let sizeMatch = t.match(/(\d{3})[^\d]*(\d{2})[^\d]*(\d{2})/);
  if(!sizeMatch){
    // נסה לזהות מספרים בדיבור
    const numWords = {'אפס':'0','אחד':'1','שתיים':'2','שלוש':'3','ארבע':'4','חמש':'5','שש':'6','שבע':'7','שמונה':'8','תשע':'9'};
    let conv = t;
    for(const [w,d] of Object.entries(numWords)) conv = conv.replace(new RegExp(w,'g'),d);
    sizeMatch = conv.match(/(\d{3})[^\d]*(\d{2})[^\d]*(\d{2})/);
  }
  if(sizeMatch){
    const sizeStr = sizeMatch[1]+'/'+sizeMatch[2]+'R'+sizeMatch[3];
    document.getElementById('aSz').value = sizeStr;
  }

  // ─── מותג ───
  const brands = ['michelin','bridgestone','continental','pirelli','goodyear','dunlop','yokohama','bfgoodrich','falken','toyo','hankook','kumho','nexen','cooper','nitto','firestone'];
  const hebrewBrands = {'מישלן':'Michelin','ברידג\'סטון':'Bridgestone','קונטיננטל':'Continental','פירלי':'Pirelli','גודייר':'Goodyear','דנלופ':'Dunlop','יוקוהמה':'Yokohama','פאלקן':'Falken','טויו':'Toyo','האנקוק':'Hankook','קומהו':'Kumho','נקסן':'Nexen','קופר':'Cooper','ניטו':'Nitto','פיירסטון':'Firestone'};
  for(const [heb,eng] of Object.entries(hebrewBrands)){
    if(t.includes(heb.toLowerCase())){ document.getElementById('aBr').value = eng; break; }
  }
  for(const b of brands){
    if(t.includes(b)){ document.getElementById('aBr').value = b.charAt(0).toUpperCase()+b.slice(1); break; }
  }

  // ─── עמודה ───
  const colMatch = t.match(/עמוד[הא]?\s*([\d]+)/) || t.match(/עמוד[הא]?\s+(\w+)/);
  if(colMatch){
    const num = hebrewToNum(colMatch[1]);
    if(num) document.getElementById('aCo').value = num;
  }

  // ─── קומה ───
  const floorMatch = t.match(/קומ[הא]\s*([\d]+)/) || t.match(/קומ[הא]\s+(\w+)/);
  if(floorMatch){
    const num = hebrewToNum(floorMatch[1]);
    if(num) document.getElementById('aFl').value = num;
  }

  // ─── שורה ימין / שמאל ───
  if(t.includes('ימין')){
    const rowMatch = t.match(/ימין\s*([\d]+)/) || t.match(/צד ימין\s*([\d]+)/);
    if(rowMatch) document.getElementById('aP1').value = rowMatch[1];
    else document.getElementById('aP1').value = 'ימין';
  }
  if(t.includes('שמאל')){
    const rowMatch = t.match(/שמאל\s*([\d]+)/) || t.match(/צד שמאל\s*([\d]+)/);
    if(rowMatch) document.getElementById('aP2').value = rowMatch[1];
    else document.getElementById('aP2').value = 'שמאל';
  }

  // ─── פניה 1 / 2 ───
  const pn1Match = t.match(/פניה\s*[אא1]\s*([\d\w]+)/);
  if(pn1Match) document.getElementById('aPn1').value = pn1Match[1];
  const pn2Match = t.match(/פניה\s*[ב2]\s*([\d\w]+)/);
  if(pn2Match) document.getElementById('aPn2').value = pn2Match[1];

  // ─── מחסן חקלאות ───
  if(t.includes('חקלאות')){
    const agrMatch = t.match(/חקלאות\s*([\d\w]+)/);
    if(agrMatch) document.getElementById('aAgr').value = agrMatch[1];
  }

  toast('✅ שדות מולאו — בדוק ותקן אם צריך');
}

function hebrewToNum(str){
  const map = {'אחת':'1','אחד':'1','שתיים':'2','שני':'2','שלוש':'3','שלושה':'3','ארבע':'4','ארבעה':'4','חמש':'5','חמישה':'5','שש':'6','ששה':'6','שבע':'7','שבעה':'7','שמונה':'8','תשע':'9','תשעה':'9','עשר':'10','עשרה':'10','אחד עשר':'11','שנים עשר':'12','שלושה עשר':'13','ארבעה עשר':'14','חמישה עשר':'15','שש עשרה':'16','שבעה עשר':'17','שמונה עשר':'18','תשעה עשר':'19','עשרים':'20'};
  if(/^\d+$/.test(str)) return str;
  return map[str.trim()] || null;
}

/* ══ MAP EDITOR ══ */
let cages=[], walls=[], mapHistory=[];
let selectedCageId=null, nextCageId=1;
let mapTool='wall';
let isDrawing=false, drawStart=null, drawCurrent=null;
let dragCageId=null, dragOffX=0, dragOffY=0;
let mapScale=20, mapOffX=14, mapOffY=14;
let pinchDist=null, panStart=null, panOffStart=null;
const SNAP=0.5;

function setMapTool(t){
  mapTool=t;
  ['wall','cage','move','erase'].forEach(n=>{
    const b=document.getElementById('tool-'+n);
    if(!b) return;
    const on=n===t;
    b.style.background=on?'var(--accent)':'var(--card)';
    b.style.borderColor=on?'var(--accent)':'var(--border)';
    b.style.color=on?'#111':'var(--muted)';
    b.style.fontWeight=on?'900':'600';
  });
  const hints={wall:'🖊️ גרור לציור קיר — עם snap לגריד',cage:'📦 לחץ לשם כלוב על המפה',move:'✋ גרור כלוב למקום חדש',erase:'🗑️ לחץ על קיר או כלוב למחיקה'};
  const h=document.getElementById('mapHint');
  if(h) h.textContent=hints[t]||'';
  const canvas=document.getElementById('mapCanvas');
  if(canvas) canvas.style.cursor=t==='move'?'grab':t==='erase'?'cell':'crosshair';
}

function initMapEditor(){
  const canvas=document.getElementById('mapCanvas');
  const wrap=document.getElementById('mapEditorWrap');
  if(!canvas||!wrap) return;
  const saved=localStorage.getItem('tirewms_map2');
  if(saved){ try{ const d=JSON.parse(saved); cages=d.cages||[]; walls=d.walls||[]; nextCageId=d.nextId||1; }catch(e){} }
  resizeCanvas(); drawMap(); setMapTool('wall');

  // Remove old listeners
  const newCanvas = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(newCanvas, canvas);
  const cv = document.getElementById('mapCanvas');

  // Touch
  cv.addEventListener('touchstart', onTS, {passive:false});
  cv.addEventListener('touchmove',  onTM, {passive:false});
  cv.addEventListener('touchend',   onTE, {passive:false});
  // Mouse
  cv.addEventListener('mousedown', onMD);
  cv.addEventListener('mousemove', onMV);
  cv.addEventListener('mouseup',   onMU);
  cv.addEventListener('click',     onCK);

  window.addEventListener('resize',()=>{ resizeCanvas(); drawMap(); });
}

function resizeCanvas(){
  const cv=document.getElementById('mapCanvas');
  const wrap=document.getElementById('mapEditorWrap');
  if(!cv||!wrap) return;
  cv.width=wrap.clientWidth||window.innerWidth;
  cv.height=wrap.clientHeight||(window.innerHeight-180);
}

function snapV(v){ return Math.round(v/SNAP)*SNAP; }
function w2c(wx,wy){ return [wx*mapScale+mapOffX, wy*mapScale+mapOffY]; }
function c2w(cx,cy){ return [snapV((cx-mapOffX)/mapScale), snapV((cy-mapOffY)/mapScale)]; }

function getPos(e,cv){
  const r=cv.getBoundingClientRect();
  if(e.touches&&e.touches.length>0) return [e.touches[0].clientX-r.left, e.touches[0].clientY-r.top];
  return [e.clientX-r.left, e.clientY-r.top];
}

function getCageAt(wx,wy){
  for(let i=cages.length-1;i>=0;i--){
    const g=cages[i],w=g.rot?0.6:1.2,h=g.rot?1.2:0.6;
    if(wx>=g.x&&wx<=g.x+w&&wy>=g.y&&wy<=g.y+h) return g;
  }
  return null;
}

function getWallIdx(wx,wy){
  for(let i=walls.length-1;i>=0;i--){
    const w=walls[i],dx=w.x2-w.x1,dy=w.y2-w.y1,len2=dx*dx+dy*dy;
    if(len2===0) continue;
    const t=Math.max(0,Math.min(1,((wx-w.x1)*dx+(wy-w.y1)*dy)/len2));
    const d=Math.hypot(wx-(w.x1+t*dx),wy-(w.y1+t*dy));
    if(d<0.35) return i;
  }
  return -1;
}

// ── Events ──
function onTS(e){
  e.preventDefault();
  const cv=document.getElementById('mapCanvas');
  if(e.touches.length===2){
    // pinch zoom
    pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    return;
  }
  const[cx,cy]=getPos(e,cv);
  handleDown(cx,cy);
}
function onTM(e){
  e.preventDefault();
  const cv=document.getElementById('mapCanvas');
  if(e.touches.length===2&&pinchDist!==null){
    const newDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const factor=newDist/pinchDist;
    mapScale=Math.max(20,Math.min(100,mapScale*factor));
    pinchDist=newDist;
    drawMap(); return;
  }
  const[cx,cy]=getPos(e,cv);
  handleMove(cx,cy);
}
function onTE(e){
  e.preventDefault();
  pinchDist=null;
  handleUp();
}
function onMD(e){ const cv=document.getElementById('mapCanvas'); handleDown(...getPos(e,cv)); }
function onMV(e){ const cv=document.getElementById('mapCanvas'); handleMove(...getPos(e,cv)); }
function onMU(e){ handleUp(); }
function onCK(e){
  if(mapTool==='move'||mapTool==='erase'){
    const cv=document.getElementById('mapCanvas');
    const[cx,cy]=getPos(e,cv);
    const[wx,wy]=c2w(cx,cy);
    if(mapTool==='move'){
      const g=getCageAt(wx,wy);
      if(g){selectedCageId=g.id;openCageEdit(g);drawMap();}
      else{selectedCageId=null;closeCageEdit();drawMap();}
    }
  }
}

function handleDown(cx,cy){
  const[wx,wy]=c2w(cx,cy);
  if(mapTool==='wall'){
    pushHistory();
    isDrawing=true; drawStart=[wx,wy]; drawCurrent=[wx,wy];
  } else if(mapTool==='cage'){
    pushHistory();
    const id=nextCageId++;
    const g={id,name:String(id),floor:'1',x:snapV(wx-0.6),y:snapV(wy-0.3),rot:false};
    cages.push(g);
    selectedCageId=id;
    drawMap();
    openCageEdit(g);
  } else if(mapTool==='move'){
    const g=getCageAt(wx,wy);
    if(g){dragCageId=g.id;dragOffX=wx-g.x;dragOffY=wy-g.y;}
  } else if(mapTool==='erase'){
    pushHistory();
    const g=getCageAt(wx,wy);
    if(g){cages=cages.filter(c=>c.id!==g.id);selectedCageId=null;closeCageEdit();drawMap();return;}
    const wi=getWallIdx(wx,wy);
    if(wi>=0){walls.splice(wi,1);drawMap();}
  }
}

function handleMove(cx,cy){
  const[wx,wy]=c2w(cx,cy);
  if(mapTool==='wall'&&isDrawing){
    drawCurrent=[wx,wy];
    drawMap();
  } else if(mapTool==='move'&&dragCageId){
    const g=cages.find(c=>c.id===dragCageId);
    if(g){g.x=snapV(wx-dragOffX);g.y=snapV(wy-dragOffY);drawMap();}
  }
}

function handleUp(){
  if(mapTool==='wall'&&isDrawing&&drawStart&&drawCurrent){
    const[x1,y1]=drawStart,[x2,y2]=drawCurrent;
    if(Math.hypot(x2-x1,y2-y1)>0.3){
      walls.push({x1,y1,x2,y2});
    }
  }
  isDrawing=false; drawStart=null; drawCurrent=null;
  dragCageId=null;
  drawMap();
}

// ── Draw ──
function drawMap(){
  const cv=document.getElementById('mapCanvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);

  // רקע
  ctx.fillStyle='#0a0c12';
  ctx.fillRect(0,0,cv.width,cv.height);

  // גריד דק
  ctx.strokeStyle='#151820'; ctx.lineWidth=1;
  for(let x=mapOffX%mapScale;x<cv.width;x+=mapScale){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();
  }
  for(let y=mapOffY%mapScale;y<cv.height;y+=mapScale){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();
  }

  // גריד עם מספרים כל 2 מטר
  ctx.strokeStyle='#1e2333'; ctx.lineWidth=0.5;
  for(let m=0;m*mapScale+mapOffX<cv.width;m++){
    const x=m*mapScale+mapOffX;
    const y=m*mapScale+mapOffY;
    if(m%2===0){
      ctx.fillStyle='#2a3045'; ctx.font='9px Heebo'; ctx.textAlign='center';
      ctx.fillText(m+'מ',x,12);
      ctx.fillStyle='#2a3045'; ctx.textAlign='right';
      if(m>0) ctx.fillText(m+'מ',18,y+3);
    }
  }

  // קירות שמורים
  walls.forEach(w=>{
    const[x1,y1]=w2c(w.x1,w.y1),[x2,y2]=w2c(w.x2,w.y2);
    // צל
    ctx.shadowColor='rgba(74,158,255,0.3)';ctx.shadowBlur=4;
    ctx.strokeStyle='#4a9eff';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.shadowBlur=0;
    // נקודות קצה
    [x1,y1,x2,y2].forEach((v,i,a)=>{
      if(i%2===0){ctx.fillStyle='#7ac8ff';ctx.beginPath();ctx.arc(a[i],a[i+1],4,0,Math.PI*2);ctx.fill();}
    });
  });

  // preview קיר בציור
  if(mapTool==='wall'&&isDrawing&&drawStart&&drawCurrent){
    const[x1,y1]=w2c(drawStart[0],drawStart[1]);
    const[x2,y2]=w2c(drawCurrent[0],drawCurrent[1]);
    const len=Math.hypot(drawCurrent[0]-drawStart[0],drawCurrent[1]-drawStart[1]).toFixed(1);
    ctx.strokeStyle='rgba(74,158,255,0.6)';ctx.lineWidth=3;ctx.setLineDash([6,4]);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.setLineDash([]);
    // אורך
    ctx.fillStyle='#4a9eff';ctx.font='bold 11px Heebo';ctx.textAlign='center';
    ctx.fillText(len+'מ',(x1+x2)/2,(y1+y2)/2-8);
  }

  // כלובים
  cages.forEach(g=>{
    const w=g.rot?0.6:1.2,h=g.rot?1.2:0.6;
    const[cx,cy]=w2c(g.x,g.y);
    const pw=w*mapScale,ph=h*mapScale;
    const isSel=g.id===selectedCageId;
    const hasItems=items.some(it=>String(it.col)===String(g.name)&&it.floor===g.floor);
    const cnt=hasItems?items.filter(it=>String(it.col)===String(g.name)&&it.floor===g.floor).length:0;

    // צל
    if(isSel){ctx.shadowColor='#f5a623';ctx.shadowBlur=14;}
    else if(hasItems){ctx.shadowColor='rgba(62,207,142,0.3)';ctx.shadowBlur=6;}

    // רקע
    const grad=ctx.createLinearGradient(cx,cy,cx,cy+ph);
    if(isSel){grad.addColorStop(0,'#2a3e12');grad.addColorStop(1,'#1a2a0a');}
    else if(hasItems){grad.addColorStop(0,'#0d2010');grad.addColorStop(1,'#081408');}
    else{grad.addColorStop(0,'#1e2438');grad.addColorStop(1,'#151928');}
    ctx.fillStyle=grad;
    ctx.strokeStyle=isSel?'#f5a623':hasItems?'#3ecf8e':'#2a3045';
    ctx.lineWidth=isSel?2.5:1.5;

    const r=6;
    ctx.beginPath();
    ctx.moveTo(cx+r,cy);ctx.lineTo(cx+pw-r,cy);
    ctx.quadraticCurveTo(cx+pw,cy,cx+pw,cy+r);
    ctx.lineTo(cx+pw,cy+ph-r);
    ctx.quadraticCurveTo(cx+pw,cy+ph,cx+pw-r,cy+ph);
    ctx.lineTo(cx+r,cy+ph);
    ctx.quadraticCurveTo(cx,cy+ph,cx,cy+ph-r);
    ctx.lineTo(cx,cy+r);
    ctx.quadraticCurveTo(cx,cy,cx+r,cy);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;

    // שם עמודה
    ctx.fillStyle=isSel?'#f5a623':hasItems?'#3ecf8e':'#aab0c8';
    const fs=Math.min(15,pw/2.2);
    ctx.font=`bold ${fs}px Heebo`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(g.name||'?',cx+pw/2,cy+ph/2-(g.floor?8:0));

    // קומה
    if(g.floor){
      ctx.fillStyle='#4a9eff';ctx.font='9px Heebo';
      ctx.fillText('קו׳'+g.floor,cx+pw/2,cy+ph/2+8);
    }

    // badge פריטים
    if(hasItems){
      ctx.fillStyle='#3ecf8e';
      ctx.beginPath();ctx.arc(cx+pw-6,cy+6,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#0a0c12';ctx.font='bold 9px Heebo';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(cnt,cx+pw-6,cy+6);
    }

    // מידות כלוב בפינה
    ctx.fillStyle='#3e4560';ctx.font='8px Heebo';ctx.textAlign='left';ctx.textBaseline='bottom';
    if(pw>30) ctx.fillText(`${(w).toFixed(0)}×${(h).toFixed(0)}`,cx+2,cy+ph-2);
  });

  // כיוון מזרח-מערב
  ctx.fillStyle='#2a3045';ctx.font='10px Heebo';ctx.textAlign='left';
  ctx.fillText('↑ צפון',6,cv.height-8);
}

async function isBiometricAvailable(){

}

async function authenticateWithBiometric(){
  try {
    const cred = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rpId: location.hostname,
        allowCredentials: [],
        userVerification: 'required',
        timeout: 30000
      }
    });
    return !!cred;
  } catch(e) {

function getOfflineQueue(){ try{ return JSON.parse(localStorage.getItem('tirewms_offline')||'[]'); }catch(e){return[];} }
function saveOfflineQueue(q){ localStorage.setItem('tirewms_offline',JSON.stringify(q)); }

async function processOfflineQueue(){
  const q=getOfflineQueue();
  if(!q.length) return;
  const done=[];
  for(const op of q){
    try{
      if(op.type==='set') await setDoc(doc(db,'tires',String(op.id)),op.data);
      if(op.type==='del') await deleteDoc(doc(db,'tires',String(op.id)));
      done.push(op);
    }catch(e){ break; }
  }
  if(done.length){
    saveOfflineQueue(q.filter(op=>!done.includes(op)));
    window._toast && window._toast(`✅ סונכרנו ${done.length} פריטים מאופליין`);
  }
}

  if(e.data&&e.data.type==='SYNC_NOW') processOfflineQueue();
});

  window._toast && window._toast('🌐 חזר אינטרנט — מסנכרן...');

});

    const q=getOfflineQueue();
    q.push({type:'set',id:it.id,data:it});
    saveOfflineQueue(q);
    window._toast && window._toast('📵 נשמר מקומית');
  }
};
window._deleteItem = async function(id){
  if(!navigator.onLine){
    const q=getOfflineQueue();
    q.push({type:'del',id});
    saveOfflineQueue(q);
    window._toast && window._toast('📵 מחיקה תסונכרן כשיחזור אינטרנט');
    return;
  }
  try{ await deleteDoc(doc(db,'tires',String(id))); }
  catch(e){ window._toast && window._toast('❌ שגיאת מחיקה'); }
};
window._importItems = async function(data){
  for(const it of data){ await setDoc(doc(db,'tires',String(it.id)),it); }
};
window._clearAllFirestore = async function(){
  const snap=await getDocs(itemsCol);
  for(const d of snap.docs){ await deleteDoc(d.ref); }
};

/* ── הצג מסך כניסה ── */
// הסתר app ב-JS (לא ב-CSS כדי שיטען)
try{ document.querySelector('.app').style.display='none'; }catch(e){}
buildLoginScreen();

/* ── Firestore sync ── */
// עבד תור אופליין בהפעלה
setTimeout(processOfflineQueue, 3000);
setStatus('🔄 מתחבר...');
onSnapshot(itemsCol, snapshot=>{
  const newItems = snapshot.docs.map(d=>d.data());
  const newNextId = newItems.length>0 ? Math.max(...newItems.map(i=>i.id))+1 : 1;
  if(window._updateItems){
    window._updateItems(newItems, newNextId);
  } else {
    window.items = newItems;
    window.nextId = newNextId;
  }
  if(document.getElementById('syncStatus') && document.getElementById('syncStatus').textContent.includes('מתחבר'))
    setStatus(isAdminMode?'🟢 מנהל':'🟢 מחובר');
}, err=>{
  setStatus('🔴 אין חיבור');
  console.error('Firebase error:', err);
});
</script>
</body>
